    <style>
        body { background-color: #050505; color: #fff; font-family: "Microsoft JhengHei", sans-serif; overflow-x: hidden; }
        #player-wrapper { width: 100%; max-width: 420px; margin: 0 auto; aspect-ratio: 9/16; background: #000; position: relative; box-shadow: 0 0 50px rgba(212,175,55,0.4); border-radius: 20px; overflow: hidden; }
        .prism-controlbar, .prism-big-play-btn, .prism-loading, .prism-player-logo { display: none !important; }
        #click-guide { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 100; background: rgba(0,0,0,0.5); display: flex; flex-direction: column; justify-content: center; align-items: center; cursor: pointer; }
        @keyframes radar { 0% { box-shadow: 0 0 0 0 rgba(255, 215, 0, 0.8); } 70% { box-shadow: 0 0 0 20px rgba(255, 215, 0, 0); } 100% { box-shadow: 0 0 0 0 rgba(255, 215, 0, 0); } }
        @keyframes shake { 0%, 100% { transform: rotate(0deg); } 25% { transform: rotate(-1.5deg); } 75% { transform: rotate(1.5deg); } }
        .gold-btn { background: linear-gradient(180deg, #ffd700 0%, #b8860b 100%); transition: all 0.3s; }
        .radar-btn { animation: radar 2s infinite, shake 0.2s infinite; border: 2px solid white; }
        #reviews-wall { height: 400px; overflow: hidden; position: relative; mask-image: linear-gradient(transparent, black 10%, black 90%, transparent); }
        .reviews-track { display: flex; flex-direction: column; animation: scroll-v 60s linear infinite; }
        @keyframes scroll-v { 0% { transform: translateY(0); } 100% { transform: translateY(-50%); } }
        #order-form-container { display: none; opacity: 0; transform: translateY(30px); transition: all 0.8s ease; }
        .show-order { display: block !important; opacity: 1 !important; transform: translateY(0) !important; }

</head>
<body class="py-6 px-4">

    <header class="text-center mb-6">
        <div class="inline-block border-4 border-red-600 text-red-600 px-5 py-2 text-lg font-black mb-2 animate-pulse">非公開：僅限內測成員觀看</div>
        <h1 class="text-xl font-black text-yellow-500 italic leading-tight">竹北吊車大王親自揭秘：<br>60 歲依然「剛強持久」的私藏方？</h1>
    </header>

    <div id="player-wrapper">
        <div id="player-container" style="width:100%; height:100%;"></div>
        <div id="click-guide">
            <div class="text-7xl mb-4 animate-bounce">👆</div>
            <div id="guide-text" class="px-8 py-4 bg-yellow-500 text-black font-black text-2xl rounded-full shadow-2xl">查看大王秘訣</div>
        </div>
    </div>

    <div id="btn-reveal" class="hidden mt-8 text-center px-4">
        <div class="text-yellow-500 text-4xl animate-bounce mb-2">▼▼▼</div> 
        <button onclick="revealForm()" class="w-full max-w-[400px] gold-btn radar-btn text-black font-black py-7 rounded-2xl text-2xl">立即申請・奪回男人尊嚴</button>
    </div>

    <div id="order-form-container" class="mt-12 max-w-[420px] mx-auto bg-zinc-900 border-2 border-yellow-500 p-6 rounded-[40px] shadow-2xl">
        <div class="text-center mb-8">
            <h2 class="text-yellow-500 text-2xl font-black italic mb-4">霸王養精蓄力丹</h2>
            <img src="product-main.webp" class="w-40 mx-auto mb-4" alt="產品圖">
            <div class="text-zinc-500 line-through text-sm">原價 NT$2778</div>
            <div class="text-yellow-500 text-5xl font-black mt-1">NT$ 1398</div>
        </div>
        
        <form id="googleForm" action="https://docs.google.com/forms/u/0/d/e/1FAIpQLSdk2rhsOoaI5D51BYPF4nJihD_WaxOo7mwb0Mh6Dv6PrePNjQ/formResponse" method="POST" target="hidden_iframe" onsubmit="return handleFormSubmit()">
            <input type="text" name="entry.516211201" placeholder="您的姓名" required class="w-full p-4 rounded-xl mb-4 bg-white text-black text-xl font-bold">
            <input type="tel" inputmode="numeric" pattern="[0-9]*" name="entry.1762877689" placeholder="聯絡電話" required class="w-full p-4 rounded-xl mb-6 bg-white text-black text-xl font-bold">
            <input type="hidden" id="ip_address" name="entry.1005513444" value="">
            <button type="submit" class="w-full gold-btn text-black font-black py-6 rounded-2xl text-2xl">提交申請・立即重啟</button>
        </form>
        <iframe name="hidden_iframe" id="hidden_iframe" style="display:none;" onload="if(window.submitted){window.location.href='success.html';}"></iframe>
    </div>

    <section class="mt-16 max-w-[420px] mx-auto px-2">
        <h3 class="text-center text-yellow-500 font-bold mb-6 italic">--- 看看老哥們怎麼說 ---</h3>
        <div id="reviews-wall">
            <div class="reviews-track" id="reviews-container"></div>
        </div>
    </section>

    <script>
        // 獲取 IP
        fetch('https://api.ipify.org?format=json').then(r => r.json()).then(data => {
            document.getElementById('ip_address').value = data.ip;
        }).catch(e => console.log("IP fetch failed"));

        // 播放器
        var player = new Aliplayer({
            id: "player-container",
            source: "https://dailytw.store/bwvsl.mp4",
            width: "100%", height: "100%", autoplay: false, playsinline: true, controlBarVisibility: "never", useH5Prism: true
        });

        const guide = document.getElementById('click-guide');
        const guideText = document.getElementById('guide-text');

        guide.onclick = function() {
            player.play();
            this.style.display = 'none';
        };

        player.on('timeupdate', function() {
            if (player.getCurrentTime() >= 50 && !window.triggered) {
                document.getElementById('btn-reveal').classList.remove('hidden');
                window.scrollBy({ top: 250, behavior: 'smooth' });
                window.triggered = true;
            }
        });

        function revealForm() {
            if (typeof fbq === 'function') fbq('track', 'AddToCart');
            player.pause();
            guideText.innerText = "點擊繼續觀看"; 
            guide.style.display = 'flex'; 
            const form = document.getElementById('order-form-container');
            form.classList.add('show-order');
            form.scrollIntoView({ behavior: 'smooth', block: 'start' });
        }

        function handleFormSubmit() {
            if (typeof fbq === 'function') {
                fbq('track', 'InitiateCheckout', { content_name: '霸王養精蓄力丹', value: 1398, currency: 'TWD' });
            }
            window.submitted = true;
            return true;
        }

        const reviewData = [
            {n:"王老哥 (62歲, 台北)", t:"以前晚上老婆總是不滿意，用了這個兩週，現在換她叫我休息。"},
            {n:"陳先生 (58歲, 竹北)", t:"跟著吊車大王買不會錯，體力真的感覺年輕了二十歲！"},
            {n:"李桑 (65歲, 桃園)", t:"老當益壯！這個配方真的很猛，老男人備。"},
            {n:"張大哥 (59歲, 台中)", t:"一開始怕沒效，沒想到第三天就有感覺，精神飽滿。"},
            {n:"林桑 (61歲, 台南)", t:"找回男人的尊嚴，生活品質提升太多了，感謝大王。"},
            {n:"阿榮 (54歲, 高雄)", t:"體力變好很多，隔天起床不會腰酸背痛，有夠厲害。"},
            {n:"許老哥 (67歲, 宜蘭)", t:"原本都沒興趣了，現在老伴說我像變了一個人，真神奇。"},
            {n:"趙桑 (63歲, 基隆)", t:"這東西真的有後勁，現在每天都很有自信。"},
            {n:"郭先生 (56歲, 彰化)", t:"朋友推薦的，沒想到這麼好用，現在我也推薦給球友了。"},
            {n:"謝大哥 (70歲, 苗栗)", t:"活到這把歲數還能有這種體力，真的是遇到了救星。"},
            {n:"周桑 (58歲, 南投)", t:"以前三分鐘，現在半小時，老婆以為我去偷練功了。"},
            {n:"老闆阿德 (62歲, 台北)", t:"壓力大以前力不從心，現在整個人都活過來了。"},
            {n:"林主任 (64歲, 嘉義)", t:"跟大王說的一樣，男人的底氣就是要有精元，推！"},
            {n:"沈老兄 (55歲, 屏東)", t:"發貨很快，包裝隱密，效果也頂級。"},
            {n:"魏桑 (66歲, 雲林)", t:"原本以為吹牛，結果自己試了才知道什麼叫老當益壯。"},
            {n:"馬大哥 (60歲, 桃園)", t:"吃了這個之後，連晨間的感覺都回來了，感動。"},
            {n:"曾先生 (57歲, 台東)", t:"純中草藥配方真的放心，沒副作用，體力很有感。"},
            {n:"丁老哥 (69歲, 金門)", t:"大王的人品我相信，這款真的是男人最後的防線。"},
            {n:"余桑 (53歲, 台北)", t:"工作精神變好，晚上戰鬥力也變強，一舉兩得。"},
            {n:"江大哥 (65歲, 高雄)", t:"老伴現在每天都笑咪咪的，這就是最大的回報。"},
            {n:"梁先生 (59歲, 台中)", t:"非常有感的提升，整個人氣色都變好了。"},
            {n:"歐桑 (61歲, 新竹)", t:"在竹北看大王這麼多年，這款真的沒話說，買就對了。"},
            {n:"汪老兄 (64歲, 台北)", t:"已經回購第二次了，長期保養真的有差。"},
            {n:"錢先生 (58歲, 桃園)", t:"以前爬樓梯會喘，現在晚上運動都不會喘，強！"},
            {n:"羅大哥 (62歲, 台南)", t:"這才是男人該有的樣子，腰力跟體力都回來了。"},

            {n:"老吳 (61歲, 基隆)", t:"真心推薦給跟我一樣受挫過的老哥，給自己一個機會。"}
        ];

        const container = document.getElementById('reviews-container');
        [...reviewData, ...reviewData].forEach(r => {
            const div = document.createElement('div');
            div.className = "mb-4 p-4 bg-zinc-900 border-l-4 border-yellow-500 rounded-r-xl";
            div.innerHTML = `<div class="text-yellow-500 font-bold">${r.n} ⭐⭐⭐⭐⭐</div><p class="text-zinc-400 text-sm italic">"${r.t}"</p>`;
            container.appendChild(div);
        });
    </script>
